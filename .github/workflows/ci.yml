name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Use lockfile-compatible npm
        run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
