name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach real measurement exports or other personal data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Open…\n2. Select…\n3. See…"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
    validations:
      required: true
